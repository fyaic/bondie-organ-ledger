<!doctype html>
<html lang="zh-CN" class="ol-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OrganLedger Dashboard</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/dashboard.css" />
    <script>
      document.documentElement.className = "ol-" + (localStorage.getItem("ol-theme") || "__DEFAULT_THEME__");
    </script>
  </head>
  <body>
    <main class="shell">
      <!-- ===== TIER 1: primary header — IDENTICAL across all three views ===== -->
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">OrganLedger</p>
          <h1>审计看板</h1>
        </div>
        <nav class="segmented topnav" role="group" aria-label="视图">
          <button class="active" type="button" data-topview="board">看板</button>
          <button type="button" data-topview="activity">日志</button>
          <button type="button" data-topview="heatmap">文件树</button>
        </nav>
        <div class="topbar-actions">
          <button id="refreshButton" type="button">刷新</button>
          <label class="switch">
            <input id="pollToggle" type="checkbox" />
            <span>轮询</span>
          </label>
          <button id="themeButton" type="button">暗色</button>
        </div>
      </header>

      <!-- ===== TIER 2: contextual controls — swaps per view, fixed-height bar ===== -->
      <div class="subbar" aria-label="视图控件">
        <!-- board-only controls -->
        <div id="boardControls" class="controls-group">
          <div class="segmented" role="group" aria-label="看板视图">
            <button class="active" type="button" data-view="status">状态</button>
            <button type="button" data-view="severity">严重度</button>
          </div>
          <select id="dateFilter" aria-label="日期">
            <option value="recent">近 7 天</option>
            <option value="today">今日</option>
            <option value="all">全部</option>
          </select>
          <select id="systemFilter" aria-label="系统">
            <option value="all">全部系统</option>
            <option value="openclaw">OpenClaw</option>
            <option value="hermes">Hermes</option>
          </select>
          <select id="severityFilter" aria-label="严重度">
            <option value="all">全部等级</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <select id="provenanceFilter" aria-label="来源">
            <option value="all">全部来源</option>
            <option value="upstream">上游更新</option>
            <option value="agent">Agent 自改</option>
          </select>
          <input id="queryFilter" type="search" placeholder="文件或 change id" />
        </div>

        <!-- activity-only controls -->
        <div id="activityControls" class="controls-group" hidden>
          <span class="subbar-label">时间窗</span>
          <select id="activityWindow" aria-label="活动窗口">
            <option value="all">全部时间</option>
            <option value="30d">近 30 天</option>
            <option value="7d">近 7 天</option>
          </select>
        </div>

        <!-- file-tree-only controls -->
        <div id="heatmapControls" class="controls-group" hidden>
          <span id="heatmapMeta" class="heatmap-meta">—</span>
          <div class="segmented" role="group" aria-label="展开层级">
            <button id="treeExpandAll" type="button">全部展开</button>
            <button id="treeCollapseAll" type="button">全部收起</button>
          </div>
          <label class="switch">
            <input id="treeChangedOnly" type="checkbox" />
            <span>只看改动</span>
          </label>
          <label class="switch" title="打码敏感文件名并禁止定位（截图/分享用）">
            <input id="heatmapRedactToggle" type="checkbox" />
            <span>打码</span>
          </label>
          <button id="heatmapCmdButton" type="button" title="复制生成命令到终端运行">复制生成命令</button>
        </div>
      </div>

      <!-- ===== 看板 view ===== -->
      <section id="status" class="status loading" data-viewgroup="board">加载审计数据...</section>

      <section class="kpi-grid" aria-label="概览" data-viewgroup="board">
        <article class="kpi-card held">
          <span>待确认</span>
          <strong id="kpiHeld">0</strong>
        </article>
        <article class="kpi-card">
          <span>改动数</span>
          <strong id="kpiTotal">0</strong>
        </article>
        <article class="kpi-card">
          <span>涉及文件</span>
          <strong id="kpiFiles">0</strong>
        </article>
        <article class="kpi-card wide">
          <span>严重度</span>
          <div id="severityDots" class="dot-row"></div>
          <span class="kpi-sub">系统</span>
          <div id="systemDots" class="dot-row"></div>
        </article>
      </section>

      <section id="reportsBar" class="reports-bar" aria-label="近期日报" data-viewgroup="board" hidden></section>

      <section id="sourcesPanel" class="sources-panel" aria-label="器官来源" data-viewgroup="board" hidden></section>

      <section id="board" class="board" aria-label="看板" data-viewgroup="board"></section>

      <!-- ===== 日志 / Activity view ===== -->
      <section id="activityView" class="activity-view" aria-label="活动日志" hidden>
        <div id="activityStatus" class="status">加载活动日志...</div>
        <div id="activityTimeline" class="activity-timeline"></div>
      </section>

      <!-- ===== 文件树 / File-tree heatmap view ===== -->
      <section id="heatmapView" class="heatmap-view" aria-label="文件树热力" hidden>
        <div id="heatmapStatus" class="status">加载文件树...</div>
        <div class="heatmap-privacy-note">🗂️ 文件树热力：结构＝真实文件夹，<strong>颜色越深＝改动越多</strong>。点文件夹展开/收起，<strong>点文件在资源管理器/访达中定位</strong>——看板本身不显示任何文件内容 / diff。</div>
        <div id="heatmapLegend" class="heatmap-legend"></div>
        <div id="heatmapCanvas" class="heatmap-canvas"></div>
      </section>
    </main>

    <aside id="drawer" class="drawer" aria-hidden="true">
      <button id="drawerClose" class="drawer-close" type="button" aria-label="关闭">x</button>
      <div id="drawerBody"></div>
    </aside>
    <div id="overlay" class="overlay" hidden></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/dashboard.js" type="module"></script>
  </body>
</html>
