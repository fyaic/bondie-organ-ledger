name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false # one platform failing must not cancel the others — needed to localize cross-platform regressions
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Node 24's --test expands the test/*.test.ts glob itself, so `npm test`
      # works identically on Linux, Windows and macOS runners.
      - name: Test
        run: npm test
